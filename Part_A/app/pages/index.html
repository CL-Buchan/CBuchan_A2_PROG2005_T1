<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<link
			rel="stylesheet"
			href="/styles/global.css"
		/>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
			rel="stylesheet"
		/>
		<script
			src="/dist/submitForm.js"
			type="module"
			defer
		></script>
		<title>Inventory Manager</title>
	</head>
	<body>
		<header></header>
		<main>
			<h1>Inventory Manager</h1>

			<div class="container">
				<div class="item-showcase">
					<h3>Products</h3>

					<ul class="product-list">
					</ul>
				</div>

				<div class="form-container">
					<h3>Add a Product to the Database</h3>

					<form class="form">
						<input
							type="text"
							name="productName"
							placeholder="Enter product name"
						/>
						<input
							type="text"
							name="productManufacturer"
							placeholder="Enter the product manufacturer"
						/>
						<select class="dropdown-menu">
							<option id="dropdown-items"></option>
						</select>
						<input
							type="number"
							name="productQuantity"
							placeholder="Enter product quantity"
						/>
						<button
							type="submit"
							name="submit-form"
						>
							Submit
						</button>
					</form>
				</div>
			</div>
		</main>
		<footer></footer>
	</body>
</html>
